name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # 1. Lint + unit tests (fast, runs on every PR)
  # ============================================================================
  lint-and-test:
    name: Lint + unit tests (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # mlx/mlx-lm only work on Apple Silicon. Linux runners (x86_64) skip them
          # and pin sentence-transformers to CPU to avoid MPS probing in tests.
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            pip install -r requirements.txt
          else
            grep -v "^mlx" requirements.txt > /tmp/req-no-mlx.txt
            # Pin torch CPU-only on Linux to avoid pulling CUDA wheels
            sed -i 's/^torch==/torch==/; s/^sentence-transformers==.*/sentence-transformers==3.2.1/' /tmp/req-no-mlx.txt || true
            pip install -r /tmp/req-no-mlx.txt
          fi
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pytest (unit tests only, integration tests require live services)
        run: pytest --tb=short -q

  # ============================================================================
  # 2. Integration tests on Linux (ChromaDB via Docker, no MLX)
  # ============================================================================
  integration-linux:
    name: Integration tests (ChromaDB, Linux)
    runs-on: ubuntu-latest
    # Only run on main / PRs against main
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: lint-and-test
    services:
      chromadb:
        image: chromadb/chroma:0.5.23
        ports:
          - 8000:8000
        env:
          IS_PERSISTENT: "FALSE"  # in-memory for the test run
          ANONYMIZED_TELEMETRY: "False"
        options: >-
          --health-cmd "wget --spider -q http://localhost:8000/api/v1/heartbeat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (no MLX, no eval — RAGAS eval is slow and noisy on CI)
        run: |
          python -m pip install --upgrade pip
          grep -v "^mlx" requirements.txt > /tmp/req-no-mlx.txt
          pip install -r /tmp/req-no-mlx.txt
          pip install -r requirements-dev.txt

      - name: Wait for ChromaDB
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1; then
              echo "ChromaDB ready"; exit 0
            fi
            sleep 1
          done
          echo "ChromaDB did not become ready in 30s"
          exit 1

      - name: Pytest with integration marker
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
          # Apple Silicon guard bypassed in the test (we're on Linux)
          HARDWARE_TARGET: other
        run: pytest -m integration -v --tb=short

  # ============================================================================
  # 3. RAGAS smoke test (slow, runs nightly + on main, not on every PR)
  # ============================================================================
  ragas-nightly:
    name: RAGAS smoke (nightly + main only)
    runs-on: ubuntu-latest
    # Only on main push (and nightly cron — not configured here)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: integration-linux
    services:
      chromadb:
        image: chromadb/chroma:0.5.23
        ports:
          - 8000:8000
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          grep -v "^mlx" requirements.txt > /tmp/req-no-mlx.txt
          pip install -r /tmp/req-no-mlx.txt
      - name: Wait for ChromaDB
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1 && exit 0
            sleep 1
          done
          exit 1
      - name: Generate eval dataset
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
          HARDWARE_TARGET: other
        run: |
          mkdir -p data/raw/cmapss
          python scripts/download_cmapss.py  # if present, else skip
          python -m src.eval.dataset
      - name: RAGAS eval (no MLX = uses mock judge)
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
          HARDWARE_TARGET: other
          # RAGAS judge needs an LLM. On Linux CI we use a stub so the run
          # is deterministic and free. The Mac workflow below uses Qwen2.5.
          RAGAS_LLM: stub
        run: python -m src.eval.ragas_runner || echo "::warning::RAGAS run failed (see logs); non-blocking"
        continue-on-error: true
      - name: Upload RAGAS snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-snapshots
          path: reports/
          if-no-files-found: ignore
